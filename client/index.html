        "https://youtube.com/travelagency"

    <!-- Schema para FAQ (Frequently Asked Questions) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cómo puedo reservar un vuelo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes reservar vuelos directamente en nuestro sitio web buscando tu origen, destino y fechas deseadas. También puedes llamar a nuestro servicio de atención al cliente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es la política de cancelación?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nuestra política de cancelación varía según el tipo de reserva. Ofrecemos cancelación gratuita hasta 24 horas antes del vuelo para la mayoría de tarifas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Ofrecemos seguro de viaje?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, ofrecemos seguros de viaje opcionales que cubren cancelación, equipaje, asistencia médica y más. Puedes añadirlo durante el proceso de reserva."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo modificar mi reserva?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, puedes modificar tu reserva dependiendo de las condiciones de tu tarifa. Contacta con nuestro equipo o gestiona tus cambios online."
          }
        }
      ]
    }
    </script>
